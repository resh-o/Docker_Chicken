name: Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency: 
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # JOB 1: Validates code layout, syntax formatting, and compilation rules early
  code-quality:
    name: 🛡️ Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: Verify Code Formatting
      run: dotnet format --verify-no-changes -severity warn

    - name: Static Code Analysis
      run: dotnet build --configuration Release /warnaserror

  # JOB 2: Compiles the source files inside target docker configurations
  compile-and-build:
    name: 🐳 Docker Build & Package
    runs-on: ubuntu-latest
    needs: code-quality # Only starts if static formatting checks pass cleanly
    steps: 
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with: 
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
      
    - name: Build Application Containers
      run: docker compose build
    
  # JOB 3: Spins up container layout and evaluates cross-dependency integrations
  integration-testing: 
    name: 🧪 System Integration Veerification
    runs-on: ubuntu-latest
    needs: compile-and-build #Only starts after Docker builds successfully finalize
    steps: 
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with: 
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
        
    - name: Build and Launch Application Mesh
      run: docker compose up --build -d

    - name: Grace Period for Database Boot
      run: |
        echo "Giving Microsoft SQL Server 25 seconds to complete table setups..."
        sleep 25
    
    - name: Wait for API Readiness
      run: |
        echo "Waiting for ChickenAPI to wake up at http://localhost:8080..."
        timeout 60s sh -c 'until curl -sSf http://localhost:8080/GetMeEggs > /dev/null; do sleep 2; done'
        echo "ChickenAPI is up and running"

    - name: Integration Step 1 - Seed Data via API
      run: |
        echo "Posting a new chicken payload to the database..."
        curl -X POST http://localhost:8080/api/Chicken \
          -H "Content-Type: application/json" \
          -d '{"name": "Cluck Norris", "breed": "Rhode Island Red"}' \
          --fail --verbose

    - name: Integration Step 2 - Verify Front-End MVC Data Rendering
      run: |
        echo "Querying the MVC web application home page on port 80..."
        MVC_RESPONSE=$(curl -s http://localhost:80)

        echo "Asserting that the front-end view successfully displays the dynamic API string context..."
        if echo "$MVC_RESPONSE" | grep -q "Cluck Norris"; then
          echo "SUCCESS: MVC interface successfully fetched and displayed containerized API data!"
        else
          echo "ERROR: Data assertion failed. The MVC home page is not showing the injected database string payload."
          exit 1
        fi
    
    - name: Tear Down Mesh and Logs
      if: always()
      run: |
        docker compose logs api-service > api-container-debug.log
        docker compose logs chick-db-service > db-container-debug.log
        docker compose logs mvc-service > mvc-container-debug.log
        docker compose down --volumes

  # JOB 4: Automated continous delivery task gated behind previous validation approvals
  cd-deployment:
    name: 🚀 Production Cloud Deployment
    runs-on: ubuntu-latest
    needs: integration-testing
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
    - name: Execute Server Infrastructure Sync
      run: |
        echo "All automated tests passed cleanly. Initiating production handshake scripts..."

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
